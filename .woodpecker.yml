when:
  event: push
  branch: master

steps:
  - name: build
    image: bash
    commands:
      - mvn package -DskipTests

  - name: release
    image: bash
    commands:
      - export HTTPS_PROXY=http://10.0.0.3:14323 NO_PROXY="" GITHUB_TOKEN=__gh_pat__
      - TAG="build-$(date +%Y%m%d-%H%M%S)"
      - gh release create "$TAG" target/teeny-1.0-SNAPSHOT.jar --title "$TAG" --notes "Commit: $(git rev-parse --short HEAD)"

  - name: deploy
    image: bash
    commands:
      - echo "Deploying teeny JAR to droplet..."
      - hermes-push.sh droplet target/teeny-1.0-SNAPSHOT.jar /home/teeny/teeny-1.0-SNAPSHOT.jar
      - hermes-ssh.sh droplet "systemctl restart teeny-backend"
      - echo "Deployed teeny-backend"
